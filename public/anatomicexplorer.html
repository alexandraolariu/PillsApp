<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>💊Pills</title>
    <link rel="stylesheet" href="pills.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>

<body lang="en">

    <div class="wrapper">
        <header>

        </header>

        <main>
            <nav
                class="w-full fixed z-50 top-0 flex justify-start space-x-10 items-center bg-zinc-800 px-6 py-3 text-white font-sans">
                <div id="user-info" class="font-semibold" style="display: none;">
                    <p>👤<span id="user-email"></span></p>
                </div>
                <button id="signout-button" class="hover:text-red-300 font-semibold">Sign Out</button>
                <a href="reports.html" class="hover:text-green-700 font-semibold">Reports</a>
                <a href="anatomicexplorer.html" class="hover:text-green-700 font-semibold">Anatomic Explorer</a>
                <a href="mailto:alexandraolariu2000@gmail.com?subject=Help%20for%20aplication&body=Hi%20Alexandra,%20I%20have%20a%20question..."
                    class="hover:text-green-700 font-semibold">Help</a>
            </nav>

            <div class="h-[calc(100vh-110px)] container mt-[90px]">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6">
                    <!-- Coloana stângă -->
                    <div class="flex flex-col gap-6 p-7 md:overflow-y-auto md:h-[calc(100vh-130px)]">
                        <button id="button-show"
                            class="w-1/4 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg text-sm focus:outline-none focus:shadow-outline transition duration-150 ease-in-out"
                            onclick="showOtherSide()">Show Back</button>
                        <!-- Imagine față -->
                        <div id="container-front-image">
                            <div class="relative w-full">
                                <img src="images/human-body-frontal.jpg"
                                    class="w-full max-h-[70vh] object-contain rounded-lg" />
                                <div class="absolute top-[2.5%] left-[44.5%] w-[10%] h-[2.5%] bg-blue-500/40 rounded-full cursor-pointer"
                                    onclick="selectPart('Head')"></div>

                                <div class="absolute top-[4.5%] left-[44.5%] w-[10%] h-[2.5%] bg-blue-500/40 rounded-full cursor-pointer"
                                    onclick="selectPart('Forehead')"></div>

                                <div class="absolute top-[7%] left-[44.5%] w-[5%] h-[2.5%] bg-blue-500/40 rounded-full cursor-pointer"
                                    onclick="selectPart('Eye')"></div>

                                <div class="absolute top-[7%] left-[50%] w-[5%] h-[2.5%] bg-blue-500/40 rounded-full cursor-pointer"
                                    onclick="selectPart('Eye')"></div>

                                <div class="absolute top-[8%] left-[47%] w-[5%] h-[3%] bg-blue-500/40 rounded-full cursor-pointer"
                                    onclick="selectPart('Nose')"></div>

                                <div class="absolute top-[10%] left-[47%] w-[5%] h-[3%] bg-blue-500/40 rounded-full cursor-pointer"
                                    onclick="selectPart('Mouth')"></div>

                            </div>
                        </div>

                        <!-- Imagine spate -->
                        <div id="container-back-image" class="hidden">
                            <div class="relative w-full">
                                <img src="images/human-body-back.jpg"
                                    class="w-full max-h-[70vh] object-contain rounded-lg" />

                                <div class="absolute top-[20%] left-[50%] w-[4%] h-[4%] bg-red-500/40 rounded-full cursor-pointer"
                                    onclick="selectPart('Spate')"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Coloana dreaptă -->
                    <div class="bg-gray-100 p-6 rounded-lg md:overflow-y-auto md:h-[calc(100vh-160px)]">
                        <h2 id="title" class="text-xl font-semibold text-left">Selected zone:</h2>
                        <p id="description"
                            class="text-blue-600 font-semibold p-3 mt-3 border-2 border-blue-300 rounded-lg bg-blue-100 ">
                            No area selected</p>
                        <input type="number" id="age" placeholder="Age(years)"
                            class="p-3 mt-3 appearance-none border rounded-lg w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                        <input type="number" id="weight" placeholder="Weight(kg)"
                            class="mt-3 p-3 shadow appearance-none border rounded-lg w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                        <textarea name="" id="allergies" placeholder="Known Allergies(e.g. Penicilin, Lactose)"
                            class="mt-3 p-3 shadow appearance-none border rounded-lg w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"></textarea>
                        <textarea name="" id="chronic-conditions"
                            placeholder="Chronic Conditions(e.g Diabetes, HTN, Renal Diseases)"
                            class="mt-3 p-3 shadow appearance-none border rounded-lg w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"></textarea>
                        <textarea name="" id="current-medication" placeholder="Current Medication(for interactions)"
                            class="mt-3 p-3 shadow appearance-none border rounded-lg w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"></textarea>


                        <textarea id="symptoms-text"
                            class="w-full border-2 rounded-lg mt-3 p-3 focus:outline-none focus:shadow-outline" rows="4"
                            placeholder="Please add your symptoms, example: head pain in the morning"></textarea>
                        <button onclick="analyseSymptoms()" id="button-diagnose"
                            class="w-1/3 mt-3 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg text-sm focus:outline-none focus:shadow-outline transition duration-150 ease-in-out">Generate
                            Diagnose</button>
                        
                        <div id="loading" class="hidden font-bold text-gray-400 p-3"> Loading ... </div>
                        <div id="result-container" class="mt-8 hidden">
                            <h3 class="font-semibold text-left p-5">Result:</h3>

                            <div id="ai-response"
                                class="prose prose-slate bg-slate-50 p-6 rounded-xl border border-slate-200 text-slate-700 leading-relaxed">
                                <!-- Conținut generat de AI -->
                            </div>
                        </div>
                    </div>
                </div>


            </div>
        </main>

    </div>
    <script src="anatomicexplorer.js"></script>
</body>

</html>
